# Runs /api/publish once an hour via GitHub Actions' own schedule trigger.
# (Previously this ran externally via cron-job.org at a tighter 15-minute
# interval, switched to at the time because GitHub Actions' `schedule`
# trigger had shown long silent gaps on this repo — worth watching for a
# recurrence now that it's back, though a 1-hour cadence should be far less
# sensitive to GitHub's few-minutes-of-scheduling-jitter than 15 minutes was.)
# Also runs on-demand via the "Run workflow" button on the Actions tab.
#
# Required repository secrets:
#   PUBLISH_URL — the deployed app origin, e.g. https://forecastfeed.vercel.app
#   CRON_SECRET — must match the CRON_SECRET env var on the deployment
#
# Posts to the default channel (first entry in src/lib/config.ts). To add a
# second channel, duplicate the "Call publish endpoint" step below with
# ?channel=<id> appended to the URL — see README "Channels" section.
name: Publish latest tweet to Instagram

on:
  schedule:
    - cron: '0 * * * *' # every hour, on the hour (UTC)
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Call publish endpoint
        env:
          PUBLISH_URL: ${{ secrets.PUBLISH_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -sS -X POST "$PUBLISH_URL/api/publish" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -w '\n%{http_code}')
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n1)
          echo "HTTP $code"
          echo "$body"
          # 2xx = posted or nothing new; anything else fails the run
          [ "$code" -ge 200 ] && [ "$code" -lt 300 ]
